# ============================================================
# firewall-web 主入口 nginx
#
# 路由：
#   /              → frontend 容器（静态 SPA，nginx:alpine）
#   /api/*         → backend 容器（FastAPI uvicorn :8000）
#   /socket.io/*   → backend 容器（python-socketio 升级到 WebSocket）
#   /healthz       → 本地健康检查
#
# 设计：
#   - 浏览器只看到 1 个域名（80/443），零跨域
#   - WebSocket 必须带 Upgrade/Connection 头，proxy_set_header 必传
#   - 隐藏 backend X-* 头（X-Forwarded-*），但加上 X-Real-IP / X-Forwarded-Proto
# ============================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;  # 隐藏 nginx 版本

    # 客户端 body 上限（Excel 上传 665KB，留余量）
    client_max_body_size 10m;
    client_body_buffer_size 128k;

    # 后端响应超时（推送命令可能要几十秒）
    proxy_connect_timeout 30s;
    proxy_send_timeout    300s;   # POST /start-v2 可能 30s+
    proxy_read_timeout    300s;
    proxy_buffering       on;
    proxy_buffer_size     16k;
    proxy_buffers         8 32k;

    # 上游定义
    upstream backend {
        server backend:8000;
        keepalive 32;
    }
    upstream frontend_up {
        server frontend:80;
        keepalive 16;
    }

    # gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # ============================================================
    # 主 server block
    # ============================================================
    server {
        listen 80 default_server;
        server_name _;

        # 日志
        access_log /var/log/nginx/access.log;

        # 通用代理头
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;

        # 本地健康检查（用 alias 不打到 upstream）
        location = /healthz {
            access_log off;
            return 200 "ok\n";
        }

        # ---- API 反代（FastAPI） ----
        location /api/ {
            proxy_pass http://backend;
        }

        # ---- Socket.IO 反代（WebSocket + 轮询双协议） ----
        location /socket.io/ {
            proxy_pass http://backend;
            # WebSocket 升级头
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout  3600s;   # 长连接
            proxy_send_timeout  3600s;
        }

        # ---- 前端 SPA ----
        # 任何非 /api/ /socket.io/ /healthz 的请求都转发到 frontend 容器
        #   frontend 容器的 nginx 已经做了 SPA try_files 兜底
        #   index.html 已在 frontend 容器内配置了 no-cache 头
        location / {
            proxy_pass http://frontend_up;
        }
    }
}
